name: Teaching Git Conflicts - Auto Modification

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-modify:
    # Prevent infinite loop - don't trigger on bot's own commits
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if already modified
        id: check
        run: |
          if grep -q "# Target Values" economic_indicators.py; then
            echo "modified=true" >> $GITHUB_OUTPUT
          else
            echo "modified=false" >> $GITHUB_OUTPUT
          fi

      - name: Modify file to create conflict scenario
        if: steps.check.outputs.modified == 'false'
        run: |
          python3 << 'PYTHON_SCRIPT'
          # Read the current file
          with open('economic_indicators.py', 'r') as f:
              lines = f.readlines()

          # Modify the unemployment line to create future conflict
          modified_lines = []
          for line in lines:
              if line.startswith('unemployment = ') and 'None' not in line:
                  # Change the student's expression to a different one
                  modified_lines.append('unemployment = 15 / 3  # Modified by automation\n')
              else:
                  modified_lines.append(line)

          # Add validation block at the end
          validation_block = '''
          # Target Values
          # ==============
          target_growth = 2.5
          target_unemployment = 5.0
          target_inflation = 2.0

          # Validation
          if (growth_rate == target_growth and
              unemployment == target_unemployment and
              inflation == target_inflation):
              print("\\n✓ All indicators match target values!")
          else:
              print("\\n✗ Some indicators don't match targets yet")
          '''

          # Write modified content
          with open('economic_indicators.py', 'w') as f:
              f.writelines(modified_lines)
              f.write(validation_block)
          PYTHON_SCRIPT

      - name: Commit and push changes
        if: steps.check.outputs.modified == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add economic_indicators.py
          git commit -m "🤖 Add validation tests and update unemployment calculation"
          git push
