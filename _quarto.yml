project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "**/*.qmd"

jupyter: python3

website:
  title: "BEcon 6222 - Introduction to Programming"
  navbar:
    left:
      - text: "Week 1"
        menu:
          - text: "Lecture 1a: Introduction"
            href: course_materials/week_01/01a_introduction.html
          - text: "Lecture 1b: Getting Started"
            href: course_materials/week_01/01b_gettingstarted.html
          - text: "Exercise 1: Getting Started"
            file: exercise_sessions/week_01/Ex01_gettingstarted.qmd
          - text: "---"
          - text: "Recap Quiz 1 (non-graded)"
            file: examination/recap_quizzes/01b_recap.qmd
      - text: "Week 2"
        menu:
          - text: "Lecture 2a: Recap Week 1"
            file: course_materials/week_02/02_recap.qmd
          - text: "Lecture 2b: Version Control"
            file: course_materials/week_02/02_versioncontrol.qmd
          - text: "Exercise 2: First Commands in Git"
            file: exercise_sessions/week_02/Ex02_FirstCommitsInGit.qmd
          - text: "---"
          - text: "Git Cheat Sheet (PDF)"
            file: course_materials/week_02/git-cheat-sheet-education.pdf
      - text: "Week 3"
        menu:
          - text: "Lecture 3: Version Control with Others"
            file: course_materials/week_03/03_versioncontrolwithothers.qmd
          - text: "In-class Exercise 3: Git Collaboration"
            file: course_materials/week_03/ex03_git_collaboration.qmd
          - text: "generate_data.py"
            file: course_materials/week_03/generate_data.py
          - text: "---"
          - text: "Exercise 3: GitHub"
            file: exercise_sessions/week_03/Ex03_GitHub.qmd
      - text: "Admin"
        menu:
          - text: "Syllabus"
            file: admin/source/syllabus_v1.pdf

format:
  revealjs:
    template-partials:
      - assets/style/title-slide.html
    width: 1280
    height: 720
    smaller: true
    embed-resources: true
    self-contained: true
    slide-number: c
    theme: assets/style/hsgtheme.scss
    highlight-style: dracula
    code-line-numbers: false

  html:
    theme:
      - flatly
      - assets/style/hsgtheme.scss
    toc: true
    toc-location: right
    code-line-numbers: false
    highlight-style: dracula
